name: Java CI

on:
  push:
    tags-ignore:
      - '*'
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - java: '8'
            modules: 'transview-formats/transview-core,transview-formats/transview-cad,transview-formats/transview-poi,transview-servlet-javax,transview-all-javax,transview-spring-boot2-starter,transview-demos/transview-demo-boot2'
          - java: '17'
            modules: 'transview-formats/transview-core,transview-formats/transview-cad,transview-formats/transview-poi,transview-servlet-jakarta,transview-all-jakarta,transview-spring-boot3-starter,transview-demos/transview-demo-boot3'
          - java: '21'
            modules: 'transview-formats/transview-core,transview-formats/transview-cad,transview-formats/transview-poi,transview-servlet-jakarta,transview-all-jakarta,transview-spring-boot4-starter,transview-demos/transview-demo-boot4'
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven
      - name: Build and test
        run: mvn clean test -pl ${{ matrix.modules }} -am -Dlicense.skip=true -B
      - name: Clean build artifacts
        if: always()
        run: find . -name target -type d -exec rm -rf {} + 2>/dev/null || true

