name: Java CI

on:
  push:
    tags-ignore:
      - '*'
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - java: '8'
            modules: 'transview-core,transview-cad,transview-poi,transview-servlet-javax,transview-all-jdk8,transview-demo-boot2'
          - java: '17'
            modules: 'transview-core,transview-cad,transview-poi,transview-servlet-jakarta,transview-all,transview-demo'
          - java: '21'
            modules: 'transview-core,transview-cad,transview-poi,transview-servlet-jakarta,transview-all,transview-demo-boot4'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven
      - name: maven-settings-xml-action
        uses: whelk-io/maven-settings-xml-action@v21
        with:
          repositories: ''
          servers: ''
      - name: Build and test
        run: mvn clean test -pl ${{ matrix.modules }} -am -Dlicense.skip=true -B --file pom.xml

  release:
    needs: build
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: maven-settings-xml-action
        uses: whelk-io/maven-settings-xml-action@v21
        with:
          repositories: ''
          servers: ''
      - name: Package
        run: mvn clean package -DskipTests -Dlicense.skip=true -B --file pom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      - name: Extract version
        id: get-version
        run: |
          RELEASE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
      - name: Get latest tag
        id: get-latest-tag
        run: |
          LAST_TAG_ID=$(git rev-list --tags --max-count=1)
          if [ $LAST_TAG_ID != null ]; then
            LAST_VERSION=$(git describe --tags `git rev-list --tags --max-count=1`)
            echo "LAST_VERSION=$LAST_VERSION" >> $GITHUB_ENV
          else
            echo "LAST_VERSION=0" >> $GITHUB_ENV
          fi
      - name: Check if version changed
        id: version_changed
        run: |
          if [ "${{ env.RELEASE_VERSION }}" == "${{ env.LAST_VERSION }}" ]; then
            echo "version_changed=false" >> $GITHUB_ENV
          else
            echo "version_changed=true" >> $GITHUB_ENV
          fi
      - name: Stage artifacts
        run: |
          mkdir staging
          cp transview-all/target/*.jar staging
          cp transview-all-jdk8/target/*.jar staging
          cp transview-core/target/*.jar staging
          cp transview-cad/target/*.jar staging
          cp transview-poi/target/*.jar staging
          cp transview-servlet-javax/target/*.jar staging
          cp transview-servlet-jakarta/target/*.jar staging
      - uses: ncipollo/release-action@v1
        if: env.version_changed == 'true'
        with:
          allowUpdates: true
          artifacts: "staging/*.jar"
          name: "v${{ env.RELEASE_VERSION }}"
          tag: "${{ env.RELEASE_VERSION }}"
          commit: "main"
          bodyFile: "document/release.md"
          token: "${{ secrets.RELEASE_TOKEN }}"
