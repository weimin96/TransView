name: Java CI

on:
  push:
    tags-ignore:
      - '*'
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - java: '8'
            modules: 'transview-core,transview-cad,transview-poi,transview-servlet-javax,transview-all-jdk8,transview-spring-boot2-starter,transview-demo-boot2'
          - java: '17'
            modules: 'transview-core,transview-cad,transview-poi,transview-servlet-jakarta,transview-all,transview-spring-boot-starter,transview-demo'
          - java: '21'
            modules: 'transview-core,transview-cad,transview-poi,transview-servlet-jakarta,transview-all,transview-spring-boot4-starter,transview-demo-boot4'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven
      - name: Build and test
        run: mvn clean test -pl ${{ matrix.modules }} -am -Dlicense.skip=true -B
      - name: Clean build artifacts
        if: always()
        run: find . -name target -type d -exec rm -rf {} + 2>/dev/null || true

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Extract version
        id: get-version
        run: |
          RELEASE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -B)
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
      - name: Get latest tag
        run: |
          LAST_TAG_ID=$(git rev-list --tags --max-count=1 2>/dev/null || echo "")
          if [ -n "$LAST_TAG_ID" ]; then
            LAST_VERSION=$(git describe --tags "$LAST_TAG_ID")
            echo "LAST_VERSION=$LAST_VERSION" >> $GITHUB_ENV
          else
            echo "LAST_VERSION=0" >> $GITHUB_ENV
          fi
      - name: Check if version changed
        run: |
          if [ "${{ env.RELEASE_VERSION }}" == "${{ env.LAST_VERSION }}" ]; then
            echo "version_changed=false" >> $GITHUB_ENV
          else
            echo "version_changed=true" >> $GITHUB_ENV
          fi
      - name: Package
        if: env.version_changed == 'true'
        run: mvn clean package -DskipTests -Dlicense.skip=true -B -pl transview-bom,transview-core,transview-cad,transview-poi,transview-servlet-javax,transview-servlet-jakarta,transview-all,transview-all-jdk8,transview-spring-boot2-starter,transview-spring-boot-starter,transview-spring-boot4-starter -am
      - name: Stage artifacts
        if: env.version_changed == 'true'
        run: |
          mkdir staging
          cp transview-all/target/*.jar staging
          cp transview-all-jdk8/target/*.jar staging
          cp transview-core/target/*.jar staging
          cp transview-cad/target/*.jar staging
          cp transview-poi/target/*.jar staging
          cp transview-servlet-javax/target/*.jar staging
          cp transview-servlet-jakarta/target/*.jar staging
          cp transview-spring-boot2-starter/target/*.jar staging
          cp transview-spring-boot-starter/target/*.jar staging
          cp transview-spring-boot4-starter/target/*.jar staging
      - name: Create GitHub Release
        if: env.version_changed == 'true'
        uses: ncipollo/release-action@v2
        with:
          allowUpdates: true
          artifacts: "staging/*.jar"
          name: "v${{ env.RELEASE_VERSION }}"
          tag: "${{ env.RELEASE_VERSION }}"
          commit: "main"
          bodyFile: "document/release.md"
          token: "${{ github.token }}"
      - name: Clean build artifacts
        if: always()
        run: |
          rm -rf staging
          find . -name target -type d -exec rm -rf {} + 2>/dev/null || true
