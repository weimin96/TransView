name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '要发布的版本号，例如 2.1.1'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: CENTER_USERNAME
          server-password: CENTER_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Resolve release version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_VERSION="$INPUT_VERSION"
          else
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release version: $RELEASE_VERSION"
            exit 1
          fi

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Verify version consistency
        shell: bash
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -B)
          if [ "$POM_VERSION" != "$RELEASE_VERSION" ]; then
            echo "::error::Version mismatch: tag=$RELEASE_VERSION, pom.xml=$POM_VERSION"
            exit 1
          fi
          echo "Version verified: $RELEASE_VERSION"

      - name: Build and test
        run: mvn clean test -B

      - name: Package
        run: |
          MODULES="transview-bom,transview-formats/transview-core,transview-formats/transview-cad,transview-formats/transview-poi,transview-formats/transview-ofd,transview-servlet-javax,transview-servlet-jakarta,transview-all-jakarta,transview-all-javax,transview-spring-boot2-starter,transview-spring-boot3-starter,transview-spring-boot4-starter"
          mvn clean package -DskipTests -Dlicense.skip=true -B -pl "$MODULES" -am

      - name: Stage artifacts
        run: |
          mkdir staging
          cp transview-all-jakarta/target/*.jar staging
          cp transview-all-javax/target/*.jar staging
          cp transview-formats/transview-core/target/*.jar staging
          cp transview-formats/transview-cad/target/*.jar staging
          cp transview-formats/transview-poi/target/*.jar staging
          cp transview-formats/transview-ofd/target/*.jar staging
          cp transview-servlet-javax/target/*.jar staging
          cp transview-servlet-jakarta/target/*.jar staging
          cp transview-spring-boot2-starter/target/*.jar staging
          cp transview-spring-boot3-starter/target/*.jar staging
          cp transview-spring-boot4-starter/target/*.jar staging

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "staging/*.jar"
          name: "v${{ env.RELEASE_VERSION }}"
          tag: "v${{ env.RELEASE_VERSION }}"
          commit: "main"
          bodyFile: "document/release.md"
          token: "${{ github.token }}"

      - name: Deploy to Maven Central
        run: mvn clean deploy -P release -Drevision="${RELEASE_VERSION}" -DskipTests -B
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          CENTER_USERNAME: ${{ secrets.CENTER_USERNAME }}
          CENTER_PASSWORD: ${{ secrets.CENTER_PASSWORD }}

      - name: Clean build artifacts
        if: always()
        run: |
          rm -rf staging
          find . -name target -type d -exec rm -rf {} + 2>/dev/null || true
