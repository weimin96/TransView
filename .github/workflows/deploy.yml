name: deploy
on:
  workflow_dispatch:
    inputs:
      version:
        description: '要发布的版本号，例如 2.0.6'
        required: true
        type: string
  push:
    tags:
      - '*'

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trans-view-release-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: CENTER_USERNAME
          server-password: CENTER_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Resolve release version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_VERSION="$INPUT_VERSION"
          else
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release version: $RELEASE_VERSION"
            exit 1
          fi

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
      - name: Publish to Maven Central
        run: mvn clean deploy -P release -Drevision="${RELEASE_VERSION}" -B
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          CENTER_USERNAME: ${{ secrets.CENTER_USERNAME }}
          CENTER_PASSWORD: ${{ secrets.CENTER_PASSWORD }}
      - name: Clean build artifacts
        if: always()
        run: find . -name target -type d -exec rm -rf {} + 2>/dev/null || true
