name: deploy
on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  trans-view-release-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: CENTER_USERNAME
          server-password: CENTER_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Publish to Maven Central
        run: mvn clean deploy -P release -Dmaven.test.skip=true -B
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          CENTER_USERNAME: ${{ secrets.CENTER_USERNAME }}
          CENTER_PASSWORD: ${{ secrets.CENTER_PASSWORD }}
      - name: Clean build artifacts
        if: always()
        run: find . -name target -type d -exec rm -rf {} + 2>/dev/null || true
